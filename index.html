<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workload Dashboard ห้องยาลีลาวดี</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun',sans-serif;background:#F5F6FA;min-height:100vh;color:#1a1a2e}
    #app{max-width:880px;margin:0 auto;padding:1.25rem 1rem}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:1rem}
    h1{font-size:18px;font-weight:700}
    .subtitle{font-size:12px;color:#B07010;font-weight:600;margin-top:2px}
    .datelabel{font-size:12px;color:#aaa;margin-top:2px}
    .load-btn{border:0.5px solid #2E7BC4;border-radius:10px;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#fff;font-size:13px;color:#2E7BC4;font-weight:600;transition:background .15s}
    .load-btn:hover{background:#DDEEFF}
    .upload-label{border:0.5px dashed #ccc;border-radius:10px;padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#fafafa;font-size:13px;color:#555;transition:background .15s}
    .upload-label:hover{background:#f0f1f5}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}
    .slicer{background:#f7f8fa;border:0.5px solid #e8e8ec;border-radius:12px;padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;flex-wrap:wrap;gap:10px}
    .slicer-label{font-size:12px;color:#888;font-weight:600;white-space:nowrap}
    .chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
    .chip{padding:4px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:0.5px solid #d0d0d8;background:#fff;color:#555;transition:all .12s}
    .chip.edge{border:2px solid #2E7BC4;color:#2E7BC4;font-weight:700}
    .chip.inrange{background:#ddeeff;border-color:#2E7BC4;color:#1A4F82}
    .slicer-info{font-size:11px;color:#888;white-space:nowrap}
    .reset-btn{font-size:12px;color:#888;padding:4px 8px;border-radius:8px;border:0.5px solid #d0d0d8;background:transparent;cursor:pointer}
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1.25rem}
    .kpi{background:#f7f8fa;border-radius:10px;padding:12px 16px}
    .kpi-lbl{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .kpi-val{font-size:22px;font-weight:700;color:#1a1a2e;line-height:1}
    .kpi-sub{font-size:11px;color:#aaa;margin-top:3px}
    .kpi-val.danger{color:#C0392B}
    .tab-row{border-bottom:0.5px solid #e8e8ec;display:flex;margin-bottom:16px}
    .tab{padding:7px 18px;font-size:13px;border:none;background:none;cursor:pointer;color:#999;border-bottom:2px solid transparent;font-weight:400;margin-bottom:-1px}
    .tab.on{color:#1a1a2e;border-bottom-color:#1a1a2e;font-weight:600}
    .card{background:#fff;border:0.5px solid #e8e8ec;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
    .role-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .role-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block}
    .role-title{font-size:13px;font-weight:600}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .bar-name{width:130px;font-size:12px;color:#444;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar-bg{flex:1;height:22px;background:#f0f1f5;border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .3s}
    .bar-num{font-size:11px;color:#fff;font-weight:600;white-space:nowrap}
    .role-pill{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
    .person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
    .person-card{background:#fff;border:0.5px solid #e8e8ec;border-radius:12px;padding:1rem 1.25rem}
    .person-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .stat-row{display:flex;gap:8px;flex-wrap:wrap}
    .stat-box{flex:1;min-width:70px;background:#f7f8fa;border-radius:8px;padding:8px}
    .stat-lbl{font-size:10px;color:#aaa}
    .stat-val{font-size:18px;font-weight:700;color:#1a1a2e}
    .stat-box.err{background:#fff0f0}
    .stat-box.err .stat-lbl{color:#C0392B}
    .stat-box.err .stat-val{color:#C0392B}
    .delta-up{font-size:11px;color:#4A8C2A;margin-left:4px}
    .delta-down{font-size:11px;color:#C0392B;margin-left:4px}
    .empty-state{text-align:center;padding:4rem 2rem;color:#aaa}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty-title{font-size:15px;font-weight:600;color:#999;margin-bottom:6px}
    select{font-size:13px;padding:5px 10px;border-radius:8px;border:0.5px solid #d0d0d8;background:#fff;color:#1a1a2e}
    .filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .filter-bar label{font-size:12px;color:#888}
    .no-data{text-align:center;padding:2rem;color:#aaa;font-size:13px}
    .loading{text-align:center;padding:3rem;color:#888;font-size:14px}
    .progress{font-size:12px;color:#aaa;margin-top:6px}
    .toast{position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}
    .person-select-bar{background:#fff;border:0.5px solid #e8e8ec;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .person-select-bar label{font-size:13px;color:#555;font-weight:600}
    .person-info{font-size:12px;color:#aaa;margin-left:auto}
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const GITHUB_USER="brigxm46",GITHUB_REPO="Pharamcy-dashboard",DATA_FOLDER="data";
const API_BASE=`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FOLDER}`;

const R={
  precheckin:{hex:"#2E7BC4",fill:"#DDEEFF",text:"#1A4F82",label:"Precheckin"},
  จัดยา:{hex:"#4A8C2A",fill:"#DFF0D1",text:"#2C5518",label:"จัดยา"},
  เช็คยา:{hex:"#B07010",fill:"#FEF0CC",text:"#7A4E08",label:"เช็คยา"},
  จ่ายยา:{hex:"#C0392B",fill:"#FDDEDD",text:"#7B1F1A",label:"จ่ายยา"},
};
const ROLES=["precheckin","จัดยา","เช็คยา","จ่ายยา"];
const PC=["#2E7BC4","#B07010","#534AB7","#0F6E56","#C0392B","#2D6A8E","#4A8C2A","#8E5A2D"];

const shortName=n=>n.replace(/^(นางสาว|นาย|นาง)/,"").split(" ")[0];
const initials=n=>n.replace(/^(นางสาว|นาย|นาง)/,"").slice(0,2);
const toN=v=>{const x=Number(v);return isNaN(x)?0:x};

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}

function dateFromFilename(name){
  const m=name.match(/(\d{4}-\d{2}-\d{2})/);if(m)return m[1];
  const m2=name.match(/(\d{2})[_\-](\d{2})[_\-](\d{4})/);if(m2)return`${m2[3]}-${m2[2]}-${m2[1]}`;
  return null;
}

function parseRows(rows,date){
  let sub=-1;
  for(let i=0;i<Math.min(10,rows.length);i++){if(rows[i]?.some?.(c=>c&&String(c).includes("ชื่อ"))){sub=i+1;break}}
  if(sub<0)return[];
  const out=[];
  for(let i=sub+1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[1])continue;
    const name=String(r[1]).trim();if(!name||name==="None")continue;
    const prx=toN(r[4]),pitems=toN(r[5]),jitems=toN(r[6]),jerr=toN(r[7]);
    const crx=toN(r[8]),citems=toN(r[9]),drx=toN(r[10]),ditems=toN(r[11]);
    if(prx||pitems)out.push({date,name,role:"precheckin",rx:prx,items:pitems,errors:0});
    if(jitems)out.push({date,name,role:"จัดยา",rx:0,items:jitems,errors:jerr});
    if(crx||citems)out.push({date,name,role:"เช็คยา",rx:crx,items:citems,errors:0});
    if(drx||ditems)out.push({date,name,role:"จ่ายยา",rx:drx,items:ditems,errors:0});
  }
  return out;
}

async function parseXlsx(buf,date){
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return parseRows(XLSX.utils.sheet_to_json(ws,{header:1,defval:null}),date);
}

function aggByName(rows){
  const m={};
  rows.forEach(r=>{if(!m[r.name])m[r.name]={name:r.name,role:r.role,rx:0,items:0,errors:0};m[r.name].rx+=r.rx;m[r.name].items+=r.items;m[r.name].errors+=r.errors;});
  return Object.values(m);
}

// ── State ────────────────────────────────────────────────────────────────────
let allData=[],slicerStart=null,slicerEnd=null,currentTab="overview",metricOv="items",metricP="items",roleP="all",selectedPerson="";
const charts={};

function getAllDates(){return[...new Set(allData.map(d=>d.date))].sort()}
function getSlicedDates(){
  const all=getAllDates();
  if(!slicerStart)return all;
  if(!slicerEnd)return all.filter(d=>d===slicerStart);
  return all.filter(d=>d>=slicerStart&&d<=slicerEnd);
}
function getFiltered(){
  const dates=getSlicedDates();
  let d=allData.filter(r=>dates.includes(r.date));
  if(currentTab==="person"&&roleP!=="all")d=d.filter(r=>r.role===roleP);
  return d;
}
function getMetric(){return currentTab==="overview"?metricOv:metricP}

// ── Load from GitHub ─────────────────────────────────────────────────────────
async function loadFromGitHub(){
  document.getElementById("app").innerHTML=`<div class="loading">⏳ กำลังโหลดข้อมูลจาก GitHub...<div class="progress" id="prog"></div></div>`;
  try{
    const res=await fetch(API_BASE);
    if(!res.ok)throw new Error(`GitHub API error: ${res.status}`);
    const files=await res.json();
    const xlsxFiles=files.filter(f=>f.name.match(/\.xlsx?$/i));
    if(!xlsxFiles.length){showToast("ไม่พบไฟล์ Excel ในโฟลเดอร์ data/");render();return;}
    let loaded=0;allData=[];
    for(const file of xlsxFiles){
      document.getElementById("prog").textContent=`โหลด ${++loaded}/${xlsxFiles.length}: ${file.name}`;
      const date=dateFromFilename(file.name);if(!date)continue;
      const r=await fetch(file.download_url);
      const buf=await r.arrayBuffer();
      allData.push(...await parseXlsx(new Uint8Array(buf),date));
    }
    slicerStart=null;slicerEnd=null;selectedPerson="";
    showToast(`✓ โหลดสำเร็จ ${xlsxFiles.length} ไฟล์`);render();
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="loading">❌ โหลดไม่สำเร็จ: ${e.message}<br><br><button onclick="render()" style="padding:8px 16px;border-radius:8px;border:1px solid #ccc;cursor:pointer">กลับหน้าหลัก</button></div>`;
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById("app").addEventListener("change",async e=>{
  if(e.target.id==="fileInput"){
    for(const file of e.target.files){
      const date=dateFromFilename(file.name)||prompt(`ไม่พบวันที่ใน "${file.name}"\nพิมพ์วันที่ (YYYY-MM-DD):`);
      if(!date)continue;
      const buf=await file.arrayBuffer();
      const parsed=await parseXlsx(new Uint8Array(buf),date);
      if(!parsed.length)continue;
      allData=allData.filter(d=>d.date!==date);
      allData.push(...parsed);
    }
    slicerStart=null;slicerEnd=null;showToast("✓ อัปโหลดสำเร็จ");render();
  }
  if(e.target.id==="metricOv"){metricOv=e.target.value;render();}
  if(e.target.id==="metricP"){metricP=e.target.value;render();}
  if(e.target.id==="roleP"){roleP=e.target.value;render();}
  if(e.target.id==="personSel"){selectedPerson=e.target.value;setTimeout(renderTrendCharts,50);}
});
document.getElementById("app").addEventListener("click",e=>{
  if(e.target.id==="btnLoadGH")loadFromGitHub();
  if(e.target.classList.contains("chip")){
    const date=e.target.dataset.date;
    if(!slicerStart||slicerEnd){slicerStart=date;slicerEnd=null;}
    else{if(date<slicerStart){slicerEnd=slicerStart;slicerStart=date;}else slicerEnd=date;}
    render();
  }
  if(e.target.id==="resetSlicer"){slicerStart=null;slicerEnd=null;render();}
  if(e.target.classList.contains("tab")){currentTab=e.target.dataset.tab;render();}
});

// ── Charts ────────────────────────────────────────────────────────────────────
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function makeLineChart(id,labels,datasets){
  destroyChart(id);
  const ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{type:"line",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{font:{size:11}},beginAtZero:true}}}});
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const filtered=getFiltered();
  const dates=getAllDates();
  const sliced=getSlicedDates();
  const metric=getMetric();
  const totalItems=filtered.reduce((s,r)=>s+r.items,0);
  const totalRx=filtered.reduce((s,r)=>s+r.rx,0);
  const totalErr=filtered.reduce((s,r)=>s+r.errors,0);
  const names=[...new Set(filtered.map(r=>r.name))].length;
  const dateRangeLabel=dates.length===0?"ยังไม่มีข้อมูล":dates.length===1?dates[0]:`${dates[0]} ถึง ${dates[dates.length-1]} (${dates.length} วัน)`;
  const infoText=!slicerStart?"คลิกเลือกวันเริ่มต้น":!slicerEnd?`เริ่ม ${slicerStart.slice(5)} — คลิกเลือกวันสิ้นสุด`:`${slicerStart.slice(5)} – ${slicerEnd.slice(5)}`;
  const chipStatus=d=>{if(!slicerStart)return"";if(!slicerEnd)return d===slicerStart?"edge":"";if(d===slicerStart||d===slicerEnd)return"edge";if(d>slicerStart&&d<slicerEnd)return"inrange";return""};

  // destroy trend charts on re-render
  ["trend_1","trend_2"].forEach(destroyChart);

  document.getElementById("app").innerHTML=`
  <div class="topbar">
    <div>
      <h1>Workload Dashboard ห้องยาลีลาวดี</h1>
      <div class="subtitle">เฉพาะในเวลาทำการ</div>
      <div class="datelabel">${dateRangeLabel}</div>
    </div>
    <div class="btn-row">
      <button class="load-btn" id="btnLoadGH">🔄 โหลดจาก GitHub</button>
      <label class="upload-label">📂 อัปโหลด Excel<input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none"></label>
    </div>
  </div>

  ${dates.length>0?`<div class="slicer">
    <span class="slicer-label">ช่วงวันที่</span>
    <div class="chips">${dates.map(d=>`<button class="chip ${chipStatus(d)}" data-date="${d}">${d.slice(5)}</button>`).join("")}</div>
    <span class="slicer-info">${infoText}</span>
    <button class="reset-btn" id="resetSlicer">รีเซ็ต</button>
  </div>`:""}

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-lbl">บุคลากร</div><div class="kpi-val">${names}</div><div class="kpi-sub">คน</div></div>
    <div class="kpi"><div class="kpi-lbl">จำนวนวัน</div><div class="kpi-val">${sliced.length||"—"}</div><div class="kpi-sub">วัน</div></div>
    <div class="kpi"><div class="kpi-lbl">รายการยารวม</div><div class="kpi-val">${totalItems.toLocaleString()}</div><div class="kpi-sub">รายการ</div></div>
    <div class="kpi"><div class="kpi-lbl">ใบสั่งยารวม</div><div class="kpi-val">${totalRx.toLocaleString()}</div><div class="kpi-sub">ใบ</div></div>
    <div class="kpi"><div class="kpi-lbl">จัดผิด</div><div class="kpi-val${totalErr>0?" danger":""}">${totalErr}</div><div class="kpi-sub">รายการ</div></div>
  </div>

  <div class="tab-row">
    <button class="tab${currentTab==="overview"?" on":""}" data-tab="overview">ภาพรวม</button>
    <button class="tab${currentTab==="trend"?" on":""}" data-tab="trend">แนวโน้มรายบุคคล</button>
    <button class="tab${currentTab==="person"?" on":""}" data-tab="person">รายบุคคล</button>
  </div>

  ${allData.length===0?`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">ยังไม่มีข้อมูล</div><div>กด <b>โหลดจาก GitHub</b> เพื่อดึงข้อมูลล่าสุด<br>หรืออัปโหลด Excel โดยตรง</div></div>`:""}
  ${allData.length>0&&currentTab==="overview"?renderOverview(filtered,metric):""}
  ${allData.length>0&&currentTab==="trend"?renderTrendSection():""}
  ${allData.length>0&&currentTab==="person"?renderPersonHTML(filtered,metric,sliced):""}
  `;

  if(allData.length>0&&currentTab==="trend")setTimeout(renderTrendCharts,50);
}

function renderOverview(filtered,metric){
  const sel=`<div class="filter-bar"><label>แสดง:</label><select id="metricOv"><option value="items"${metric==="items"?" selected":""}>รายการยา</option><option value="rx"${metric==="rx"?" selected":""}>ใบสั่งยา</option></select></div>`;
  const cards=ROLES.filter(role=>filtered.some(r=>r.role===role)).map(role=>{
    const byName=aggByName(filtered.filter(r=>r.role===role)).sort((a,b)=>b[metric]-a[metric]);
    const max=Math.max(...byName.map(d=>d[metric]),1);
    const rc=R[role];
    const bars=byName.map(p=>{
      const pct=Math.round((p[metric]/max)*100);
      return`<div class="bar-row"><div class="bar-name">${shortName(p.name)}</div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${rc.hex}"><span class="bar-num">${p[metric].toLocaleString()}</span></div></div></div>`;
    }).join("");
    return`<div class="card"><div class="role-header"><span class="role-dot" style="background:${rc.hex}"></span><span class="role-title">${rc.label} — ${byName.length} คน</span></div>${bars}</div>`;
  }).join("");
  return sel+cards;
}

function renderTrendSection(){
  const sliced=getSlicedDates();
  if(sliced.length<2)return`<div class="no-data">ต้องการข้อมูลอย่างน้อย 2 วันขึ้นไป</div>`;

  // รายชื่อทุกคน เรียงตาม role แล้วชื่อ
  const allNames=[...new Set(allData.map(r=>r.name))].sort();
  if(!selectedPerson||!allNames.includes(selectedPerson))selectedPerson=allNames[0]||"";

  const personRole=allData.find(r=>r.name===selectedPerson)?.role||"";
  const rc=R[personRole]||{hex:"#888",label:""};

  const charts2=personRole==="จัดยา"
    ?`<div class="card">
        <div class="role-header"><span class="role-dot" style="background:${rc.hex}"></span><span class="role-title">รายการยา (รายวัน)</span></div>
        <div style="position:relative;width:100%;height:220px"><canvas id="trend_1"></canvas></div>
      </div>
      <div class="card">
        <div class="role-header"><span class="role-dot" style="background:#C0392B"></span><span class="role-title">รายการจัดผิด (รายวัน)</span></div>
        <div style="position:relative;width:100%;height:180px"><canvas id="trend_2"></canvas></div>
      </div>`
    :`<div class="card">
        <div class="role-header"><span class="role-dot" style="background:${rc.hex}"></span><span class="role-title">${personRole==="precheckin"?"ใบสั่งยา":personRole==="เช็คยา"||personRole==="จ่ายยา"?"ใบสั่งยา & รายการยา":""} (รายวัน)</span></div>
        <div style="position:relative;width:100%;height:220px"><canvas id="trend_1"></canvas></div>
      </div>`;

  return`
    <div class="person-select-bar">
      <label>เลือกเจ้าหน้าที่:</label>
      <select id="personSel" style="min-width:220px">
        ${allNames.map(n=>`<option value="${n}"${n===selectedPerson?" selected":""}>${n}</option>`).join("")}
      </select>
      ${personRole?`<span class="role-pill" style="background:${R[personRole]?.fill||'#eee'};color:${R[personRole]?.text||'#333'}">${rc.label}</span>`:""}
    </div>
    ${charts2}`;
}

function renderTrendCharts(){
  const sliced=getSlicedDates();
  if(sliced.length<2||!selectedPerson)return;
  const labels=sliced.map(d=>d.slice(5));
  const src=allData.filter(r=>r.name===selectedPerson);
  const role=src[0]?.role||"";
  const color=R[role]?.hex||"#2E7BC4";

  destroyChart("trend_1");destroyChart("trend_2");

  if(role==="จัดยา"){
    // กราฟรายการยา
    makeLineChart("trend_1",labels,[{
      label:"รายการยา",
      data:sliced.map(d=>src.filter(r=>r.date===d).reduce((s,r)=>s+r.items,0)),
      borderColor:color,backgroundColor:color+"22",fill:true,tension:.3,pointRadius:4,borderWidth:2
    }]);
    // กราฟจัดผิด
    makeLineChart("trend_2",labels,[{
      label:"รายการจัดผิด",
      data:sliced.map(d=>src.filter(r=>r.date===d).reduce((s,r)=>s+r.errors,0)),
      borderColor:"#C0392B",backgroundColor:"#C0392B22",fill:true,tension:.3,pointRadius:4,borderWidth:2
    }]);
  } else if(role==="precheckin"){
    makeLineChart("trend_1",labels,[{
      label:"ใบสั่งยา",
      data:sliced.map(d=>src.filter(r=>r.date===d).reduce((s,r)=>s+r.rx,0)),
      borderColor:color,backgroundColor:color+"22",fill:true,tension:.3,pointRadius:4,borderWidth:2
    }]);
  } else {
    // เช็คยา, จ่ายยา — ทั้ง rx และ items
    makeLineChart("trend_1",labels,[
      {label:"ใบสั่งยา",data:sliced.map(d=>src.filter(r=>r.date===d).reduce((s,r)=>s+r.rx,0)),borderColor:color,backgroundColor:"transparent",tension:.3,pointRadius:4,borderWidth:2},
      {label:"รายการยา",data:sliced.map(d=>src.filter(r=>r.date===d).reduce((s,r)=>s+r.items,0)),borderColor:color,backgroundColor:"transparent",tension:.3,pointRadius:3,borderWidth:1.5,borderDash:[5,3]}
    ]);
  }
}

function renderPersonHTML(filtered,metric,sliced){
  const byName=aggByName(filtered).sort((a,b)=>b[metric]-a[metric]);
  const sel=`<div class="filter-bar">
    <label>Role:</label>
    <select id="roleP"><option value="all">ทุก Role</option>${ROLES.map(r=>`<option value="${r}"${roleP===r?" selected":""}>${R[r].label}</option>`).join("")}</select>
    <label>แสดง:</label>
    <select id="metricP"><option value="items"${metric==="items"?" selected":""}>รายการยา</option><option value="rx"${metric==="rx"?" selected":""}>ใบสั่งยา</option></select>
  </div>`;
  const cards=byName.map(p=>{
    const rc=R[p.role]||{fill:"#eee",text:"#666"};
    let delta="";
    if(sliced.length>=2){
      const d1=sliced[sliced.length-2],d2=sliced[sliced.length-1];
      const v1=allData.filter(r=>r.date===d1&&r.name===p.name).reduce((s,r)=>s+r[metric],0);
      const v2=allData.filter(r=>r.date===d2&&r.name===p.name).reduce((s,r)=>s+r[metric],0);
      if(v1>0){const diff=v2-v1;delta=`<span class="${diff>0?"delta-up":"delta-down"}">${diff>0?"▲":"▼"}${Math.abs(diff).toLocaleString()}</span>`;}
    }
    return`<div class="person-card">
      <div class="person-header">
        <div class="avatar" style="background:${rc.fill};color:${rc.text}">${initials(p.name)}</div>
        <div><div style="font-size:13px;font-weight:600">${p.name}</div><span class="role-pill" style="background:${rc.fill};color:${rc.text}">${R[p.role]?.label||p.role}</span></div>
      </div>
      <div class="stat-row">
        ${p.items>0?`<div class="stat-box"><div class="stat-lbl">รายการยา</div><div class="stat-val">${p.items.toLocaleString()}${delta}</div></div>`:""}
        ${p.rx>0?`<div class="stat-box"><div class="stat-lbl">ใบสั่งยา</div><div class="stat-val">${p.rx.toLocaleString()}</div></div>`:""}
        ${p.errors>0?`<div class="stat-box err"><div class="stat-lbl">จัดผิด</div><div class="stat-val">${p.errors}</div></div>`:""}
      </div>
    </div>`;
  }).join("");
  return sel+`<div class="person-grid">${cards}</div>`;
}

loadFromGitHub();
