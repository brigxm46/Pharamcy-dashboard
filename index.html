<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workload Dashboard ห้องยาลีลาวดี</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #F5F6FA; min-height: 100vh; }
    #root { max-width: 860px; margin: 0 auto; padding: 1.25rem 1rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback } = React;
    const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;
const R = {
  precheckin: { hex: "#2E7BC4", fill: "#DDEEFF", text: "#1A4F82", label: "Precheckin" },
  จัดยา:     { hex: "#4A8C2A", fill: "#DFF0D1", text: "#2C5518", label: "จัดยา" },
  เช็คยา:    { hex: "#B07010", fill: "#FEF0CC", text: "#7A4E08", label: "เช็คยา" },
  จ่ายยา:    { hex: "#C0392B", fill: "#FDDEDD", text: "#7B1F1A", label: "จ่ายยา" },
};
const PERSON_COLORS = [
  "#2E7BC4","#B07010","#6B4FBB","#1A7A5E",
  "#C0392B","#2D6A8E","#4A8C2A","#8E5A2D",
];
const ROLES = ["precheckin","จัดยา","เช็คยา","จ่ายยา"];

// ─── Helpers ──────────────────────────────────────────────────────────────────
const shortName = n => n.replace(/^(นางสาว|นาย|นาง)/, "").split(" ")[0];
const initials   = n => n.replace(/^(นางสาว|นาย|นาง)/, "").slice(0, 2);
const toN        = v => { const n = Number(v); return isNaN(n) ? 0 : n; };

function dateFromFilename(name) {
  const m = name.match(/(\d{4}-\d{2}-\d{2})/);
  if (m) return m[1];
  const m2 = name.match(/(\d{2})[_\-](\d{2})[_\-](\d{4})/);
  if (m2) return `${m2[3]}-${m2[2]}-${m2[1]}`;
  return null;
}

function parseRows(rows, date) {
  let subRow = -1;
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    if (rows[i]?.some?.(c => c && String(c).includes("ชื่อ"))) { subRow = i + 1; break; }
  }
  if (subRow < 0) return [];
  const out = [];
  for (let i = subRow + 1; i < rows.length; i++) {
    const r = rows[i]; if (!r || !r[1]) continue;
    const name = String(r[1]);
    const prx=toN(r[4]),pitems=toN(r[5]),jitems=toN(r[6]),jerr=toN(r[7]);
    const crx=toN(r[8]),citems=toN(r[9]),drx=toN(r[10]),ditems=toN(r[11]);
    if (prx||pitems) out.push({date,name,role:"precheckin",rx:prx,items:pitems,errors:0});
    if (jitems)      out.push({date,name,role:"จัดยา",rx:0,items:jitems,errors:jerr});
    if (crx||citems) out.push({date,name,role:"เช็คยา",rx:crx,items:citems,errors:0});
    if (drx||ditems) out.push({date,name,role:"จ่ายยา",rx:drx,items:ditems,errors:0});
  }
  return out;
}

function aggByName(rows) {
  const map = {};
  rows.forEach(r => {
    if (!map[r.name]) map[r.name] = { name:r.name, role:r.role, rx:0, items:0, errors:0 };
    map[r.name].rx += r.rx; map[r.name].items += r.items; map[r.name].errors += r.errors;
  });
  return Object.values(map);
}

function rankNames(src) {
  return [...new Set(src.map(r => r.name))]
    .map(n => ({ n, total: src.filter(r => r.name===n).reduce((s,r)=>s+r.items+r.rx,0) }))
    .sort((a,b) => b.total-a.total).map(x => x.n);
}

// ─── Custom Tooltip ───────────────────────────────────────────────────────────
const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:"#fff", border:"0.5px solid #d0d0d0", borderRadius:8, padding:"8px 12px", fontSize:12, boxShadow:"0 2px 8px rgba(0,0,0,0.08)" }}>
      <div style={{ fontWeight:600, marginBottom:4, color:"#333" }}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{ color:p.color||p.stroke, display:"flex", gap:8, justifyContent:"space-between" }}>
          <span>{p.name}</span><span style={{ fontWeight:600 }}>{p.value?.toLocaleString()}</span>
        </div>
      ))}
    </div>
  );
};

// ─── Role Pill ────────────────────────────────────────────────────────────────
const RolePill = ({ role }) => {
  const rc = R[role] || { fill:"#eee", text:"#666", label: role };
  return <span style={{ padding:"2px 8px", borderRadius:99, fontSize:11, fontWeight:600, background:rc.fill, color:rc.text }}>{rc.label}</span>;
};

// ─── KPI Card ─────────────────────────────────────────────────────────────────
const KPICard = ({ label, value, sub, danger }) => (
  <div style={{ background:"#F7F8FA", borderRadius:10, padding:"12px 16px", flex:1, minWidth:100 }}>
    <div style={{ fontSize:11, color:"#888", marginBottom:4, textTransform:"uppercase", letterSpacing:"0.05em" }}>{label}</div>
    <div style={{ fontSize:22, fontWeight:700, color: danger ? "#C0392B" : "#1a1a2e", lineHeight:1 }}>{value}</div>
    {sub && <div style={{ fontSize:11, color:"#aaa", marginTop:3 }}>{sub}</div>}
  </div>
);

// ─── Section Card ─────────────────────────────────────────────────────────────
const SectionCard = ({ title, roleKey, children }) => {
  const rc = roleKey ? R[roleKey] : null;
  return (
    <div style={{ background:"#fff", border:"0.5px solid #E8E8EC", borderRadius:12, padding:"1rem 1.25rem", marginBottom:14 }}>
      {title && (
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
          {rc && <span style={{ width:10, height:10, borderRadius:"50%", background:rc.hex, flexShrink:0, display:"inline-block" }} />}
          <span style={{ fontSize:13, fontWeight:600, color:"#1a1a2e" }}>{title}</span>
        </div>
      )}
      {children}
    </div>
  );
};

// ─── Date Slicer ─────────────────────────────────────────────────────────────
function DateSlicer({ dates, slicerStart, slicerEnd, onChipClick, onReset }) {
  const getStatus = d => {
    if (!slicerStart) return "idle";
    if (!slicerEnd) return d === slicerStart ? "edge" : "idle";
    if (d === slicerStart || d === slicerEnd) return "edge";
    if (d > slicerStart && d < slicerEnd) return "in";
    return "idle";
  };
  const infoText = !slicerStart ? "คลิกเลือกวันเริ่มต้น"
    : !slicerEnd ? `เริ่ม ${slicerStart.slice(5)} — คลิกเลือกวันสิ้นสุด`
    : `${slicerStart.slice(5)} – ${slicerEnd.slice(5)}`;

  return (
    <div style={{ background:"#F7F8FA", border:"0.5px solid #E8E8EC", borderRadius:12, padding:"10px 14px", marginBottom:14, display:"flex", alignItems:"center", flexWrap:"wrap", gap:10 }}>
      <span style={{ fontSize:12, color:"#888", whiteSpace:"nowrap", fontWeight:600 }}>ช่วงวันที่</span>
      <div style={{ display:"flex", flexWrap:"wrap", gap:5, flex:1 }}>
        {dates.map(d => {
          const s = getStatus(d);
          return (
            <button key={d} onClick={() => onChipClick(d)} style={{
              padding:"4px 11px", borderRadius:99, fontSize:12, cursor:"pointer",
              border: s==="edge" ? "2px solid #2E7BC4" : "0.5px solid #D0D0D8",
              background: s==="edge" ? "#fff" : s==="in" ? "#DDEEFF" : "#fff",
              color: s==="edge" ? "#2E7BC4" : s==="in" ? "#1A4F82" : "#555",
              fontWeight: s==="edge" ? 700 : 400,
              transition:"all .12s",
            }}>{d.slice(5)}</button>
          );
        })}
      </div>
      <span style={{ fontSize:11, color:"#888", whiteSpace:"nowrap" }}>{infoText}</span>
      <button onClick={onReset} style={{ fontSize:12, color:"#888", padding:"4px 10px", borderRadius:8, border:"0.5px solid #D0D0D8", background:"transparent", cursor:"pointer" }}>รีเซ็ต</button>
    </div>
  );
}

// ─── Overview Tab ─────────────────────────────────────────────────────────────
function OverviewTab({ filtered, metric, onMetricChange }) {
  return (
    <div>
      <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:14 }}>
        <span style={{ fontSize:12, color:"#888" }}>แสดง:</span>
        <select value={metric} onChange={e => onMetricChange(e.target.value)}
          style={{ fontSize:13, padding:"5px 10px", borderRadius:8, border:"0.5px solid #D0D0D8", background:"#fff", color:"#1a1a2e" }}>
          <option value="items">รายการยา</option>
          <option value="rx">ใบสั่งยา</option>
        </select>
      </div>
      {ROLES.filter(role => filtered.some(r => r.role===role)).map(role => {
        const byName = aggByName(filtered.filter(r => r.role===role)).sort((a,b) => b[metric]-a[metric]);
        const max = Math.max(...byName.map(d=>d[metric]), 1);
        return (
          <SectionCard key={role} title={`${R[role].label} — ${byName.length} คน`} roleKey={role}>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {byName.map(p => (
                <div key={p.name} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:110, fontSize:12, color:"#444", textAlign:"right", flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{shortName(p.name)}</div>
                  <div style={{ flex:1, height:22, background:"#F0F1F5", borderRadius:4, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${Math.round((p[metric]/max)*100)}%`, background:R[role].hex, borderRadius:4, display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:6, transition:"width .3s" }}>
                      <span style={{ fontSize:11, color:"#fff", fontWeight:600, whiteSpace:"nowrap" }}>{p[metric].toLocaleString()}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </SectionCard>
        );
      })}
    </div>
  );
}

// ─── Trend Tab ────────────────────────────────────────────────────────────────
function TrendTab({ slicedDates, allData }) {
  if (slicedDates.length < 2) return (
    <div style={{ textAlign:"center", padding:"3rem", color:"#aaa", fontSize:14 }}>ต้องการข้อมูลอย่างน้อย 2 วันขึ้นไปเพื่อแสดงแนวโน้ม</div>
  );
  const labels = slicedDates.map(d => d.slice(5));

  function buildLineData(src, names, fields) {
    return slicedDates.map(d => {
      const obj = { date: d.slice(5) };
      names.forEach(name => {
        fields.forEach(f => {
          const key = fields.length > 1 ? `${shortName(name)}_${f}` : shortName(name);
          obj[key] = src.filter(r => r.date===d && r.name===name).reduce((s,r)=>s+r[f],0);
        });
      });
      return obj;
    });
  }

  const cards = [];

  // Precheckin — ใบสั่งยา
  const pcSrc = allData.filter(r => r.role==="precheckin");
  if (pcSrc.length) {
    const names = rankNames(pcSrc);
    const data = buildLineData(pcSrc, names, ["rx"]);
    cards.push(
      <SectionCard key="pc" title="Precheckin — ใบสั่งยารายวัน" roleKey="precheckin">
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:10 }}>
          {names.map((n,i) => <span key={n} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:3, background:PERSON_COLORS[i%PERSON_COLORS.length], borderRadius:2, display:"inline-block" }} />{shortName(n)}</span>)}
        </div>
        <ResponsiveContainer width="100%" height={200}>
          <LineChart data={data}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="date" tick={{ fontSize:11 }} />
            <YAxis tick={{ fontSize:11 }} />
            <Tooltip content={<CustomTooltip />} />
            {names.map((n,i) => <Line key={n} type="monotone" dataKey={shortName(n)} stroke={PERSON_COLORS[i%PERSON_COLORS.length]} strokeWidth={2} dot={{ r:3 }} />)}
          </LineChart>
        </ResponsiveContainer>
      </SectionCard>
    );
  }

  // เช็คยา — ใบสั่งยา (ทึบ) + รายการยา (ประ)
  const ckSrc = allData.filter(r => r.role==="เช็คยา");
  if (ckSrc.length) {
    const names = rankNames(ckSrc);
    const data = buildLineData(ckSrc, names, ["rx","items"]);
    cards.push(
      <SectionCard key="ck" title="เช็คยา — ใบสั่งยา & รายการยา รายวัน" roleKey="เช็คยา">
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:10, color:"#aaa", marginBottom:4 }}>บุคลากร</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:6 }}>
            {names.map((n,i) => <span key={n} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:3, background:PERSON_COLORS[i%PERSON_COLORS.length], borderRadius:2, display:"inline-block" }} />{shortName(n)}</span>)}
          </div>
          <div style={{ display:"flex", gap:12 }}>
            <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:2, background:"#888", borderRadius:2, display:"inline-block" }} />เส้นทึบ = ใบสั่งยา</span>
            <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:0, borderTop:"2px dashed #888", display:"inline-block" }} />เส้นประ = รายการยา</span>
          </div>
        </div>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={data}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="date" tick={{ fontSize:11 }} />
            <YAxis tick={{ fontSize:11 }} />
            <Tooltip content={<CustomTooltip />} />
            {names.map((n,i) => [
              <Line key={n+"_rx"} type="monotone" dataKey={`${shortName(n)}_rx`} name={`${shortName(n)} ใบสั่งยา`} stroke={PERSON_COLORS[i%PERSON_COLORS.length]} strokeWidth={2} dot={{ r:3 }} />,
              <Line key={n+"_items"} type="monotone" dataKey={`${shortName(n)}_items`} name={`${shortName(n)} รายการยา`} stroke={PERSON_COLORS[i%PERSON_COLORS.length]} strokeWidth={1.5} strokeDasharray="5 3" dot={{ r:2 }} />,
            ])}
          </LineChart>
        </ResponsiveContainer>
      </SectionCard>
    );
  }

  // จ่ายยา — ใบสั่งยา (ทึบ) + รายการยา (ประ)
  const dsSrc = allData.filter(r => r.role==="จ่ายยา");
  if (dsSrc.length) {
    const names = rankNames(dsSrc);
    const data = buildLineData(dsSrc, names, ["rx","items"]);
    cards.push(
      <SectionCard key="ds" title="จ่ายยา — ใบสั่งยา & รายการยา รายวัน" roleKey="จ่ายยา">
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:10, color:"#aaa", marginBottom:4 }}>บุคลากร</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:6 }}>
            {names.map((n,i) => <span key={n} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:3, background:PERSON_COLORS[i%PERSON_COLORS.length], borderRadius:2, display:"inline-block" }} />{shortName(n)}</span>)}
          </div>
          <div style={{ display:"flex", gap:12 }}>
            <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:2, background:"#888", borderRadius:2, display:"inline-block" }} />เส้นทึบ = ใบสั่งยา</span>
            <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:0, borderTop:"2px dashed #888", display:"inline-block" }} />เส้นประ = รายการยา</span>
          </div>
        </div>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={data}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="date" tick={{ fontSize:11 }} />
            <YAxis tick={{ fontSize:11 }} />
            <Tooltip content={<CustomTooltip />} />
            {names.map((n,i) => [
              <Line key={n+"_rx"} type="monotone" dataKey={`${shortName(n)}_rx`} name={`${shortName(n)} ใบสั่งยา`} stroke={PERSON_COLORS[i%PERSON_COLORS.length]} strokeWidth={2} dot={{ r:3 }} />,
              <Line key={n+"_items"} type="monotone" dataKey={`${shortName(n)}_items`} name={`${shortName(n)} รายการยา`} stroke={PERSON_COLORS[i%PERSON_COLORS.length]} strokeWidth={1.5} strokeDasharray="5 3" dot={{ r:2 }} />,
            ])}
          </LineChart>
        </ResponsiveContainer>
      </SectionCard>
    );
  }

  // จัดยา — รายการยา
  const jdSrc = allData.filter(r => r.role==="จัดยา");
  if (jdSrc.length) {
    const names = rankNames(jdSrc);

    // รายการยา
    const dataItems = buildLineData(jdSrc, names, ["items"]);
    cards.push(
      <SectionCard key="jd_items" title="จัดยา — รายการยารายวัน" roleKey="จัดยา">
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:10 }}>
          {names.map((n,i) => <span key={n} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:3, background:PERSON_COLORS[i%PERSON_COLORS.length], borderRadius:2, display:"inline-block" }} />{shortName(n)}</span>)}
        </div>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={dataItems}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="date" tick={{ fontSize:11 }} />
            <YAxis tick={{ fontSize:11 }} />
            <Tooltip content={<CustomTooltip />} />
            {names.map((n,i) => <Line key={n} type="monotone" dataKey={shortName(n)} name={shortName(n)} stroke={PERSON_COLORS[i%PERSON_COLORS.length]} strokeWidth={2} dot={{ r:3 }} />)}
          </LineChart>
        </ResponsiveContainer>
      </SectionCard>
    );

    // รายการจัดผิด
    const dataErr = buildLineData(jdSrc, names, ["errors"]);
    cards.push(
      <SectionCard key="jd_err" title="จัดยา — รายการจัดผิดรายวัน">
        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
          <span style={{ width:10, height:10, borderRadius:"50%", background:"#C0392B", display:"inline-block" }} />
          <span style={{ fontSize:13, fontWeight:600, color:"#1a1a2e" }}></span>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:10 }}>
          {names.map((n,i) => <span key={n} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#666" }}><span style={{ width:16, height:3, background:PERSON_COLORS[i%PERSON_COLORS.length], borderRadius:2, display:"inline-block" }} />{shortName(n)}</span>)}
        </div>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={dataErr}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="date" tick={{ fontSize:11 }} />
            <YAxis tick={{ fontSize:11 }} allowDecimals={false} />
            <Tooltip content={<CustomTooltip />} />
            {names.map((n,i) => <Line key={n} type="monotone" dataKey={shortName(n)} name={shortName(n)} stroke={PERSON_COLORS[i%PERSON_COLORS.length]} strokeWidth={2} strokeDasharray="4 3" dot={{ r:3 }} />)}
          </LineChart>
        </ResponsiveContainer>
      </SectionCard>
    );
  }

  return <div>{cards}</div>;
}

// ─── Person Tab ───────────────────────────────────────────────────────────────
function PersonTab({ filtered, allData, slicedDates, metric, onMetricChange, role, onRoleChange }) {
  const byName = aggByName(filtered).sort((a,b) => b[metric]-a[metric]);
  const showDelta = slicedDates.length >= 2;
  return (
    <div>
      <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", marginBottom:14 }}>
        <span style={{ fontSize:12, color:"#888" }}>Role:</span>
        <select value={role} onChange={e => onRoleChange(e.target.value)}
          style={{ fontSize:13, padding:"5px 10px", borderRadius:8, border:"0.5px solid #D0D0D8", background:"#fff" }}>
          <option value="all">ทุก Role</option>
          {ROLES.map(r => <option key={r} value={r}>{R[r].label}</option>)}
        </select>
        <span style={{ fontSize:12, color:"#888" }}>แสดง:</span>
        <select value={metric} onChange={e => onMetricChange(e.target.value)}
          style={{ fontSize:13, padding:"5px 10px", borderRadius:8, border:"0.5px solid #D0D0D8", background:"#fff" }}>
          <option value="items">รายการยา</option>
          <option value="rx">ใบสั่งยา</option>
        </select>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))", gap:12 }}>
        {byName.map(p => {
          const rc = R[p.role] || { fill:"#eee", text:"#666" };
          let delta = null;
          if (showDelta) {
            const d1=slicedDates[slicedDates.length-2], d2=slicedDates[slicedDates.length-1];
            const v1=allData.filter(r=>r.date===d1&&r.name===p.name).reduce((s,r)=>s+r[metric],0);
            const v2=allData.filter(r=>r.date===d2&&r.name===p.name).reduce((s,r)=>s+r[metric],0);
            if (v1>0) { const diff=v2-v1; delta={ diff, up:diff>0 }; }
          }
          return (
            <div key={p.name} style={{ background:"#fff", border:"0.5px solid #E8E8EC", borderRadius:12, padding:"1rem 1.25rem" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <div style={{ width:36, height:36, borderRadius:"50%", background:rc.fill, color:rc.text, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, flexShrink:0 }}>{initials(p.name)}</div>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:"#1a1a2e" }}>{p.name}</div>
                  <RolePill role={p.role} />
                </div>
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {p.items>0 && <div style={{ flex:1, minWidth:70, background:"#F7F8FA", borderRadius:8, padding:8 }}>
                  <div style={{ fontSize:10, color:"#aaa" }}>รายการยา</div>
                  <div style={{ fontSize:18, fontWeight:700, color:"#1a1a2e" }}>{p.items.toLocaleString()}
                    {delta && <span style={{ fontSize:11, marginLeft:4, color:delta.up?"#4A8C2A":"#C0392B" }}>{delta.up?"▲":"▼"}{Math.abs(delta.diff).toLocaleString()}</span>}
                  </div>
                </div>}
                {p.rx>0 && <div style={{ flex:1, minWidth:70, background:"#F7F8FA", borderRadius:8, padding:8 }}>
                  <div style={{ fontSize:10, color:"#aaa" }}>ใบสั่งยา</div>
                  <div style={{ fontSize:18, fontWeight:700, color:"#1a1a2e" }}>{p.rx.toLocaleString()}</div>
                </div>}
                {p.errors>0 && <div style={{ flex:1, minWidth:70, background:"#FFF0F0", borderRadius:8, padding:8 }}>
                  <div style={{ fontSize:10, color:"#C0392B" }}>จัดผิด</div>
                  <div style={{ fontSize:18, fontWeight:700, color:"#C0392B" }}>{p.errors}</div>
                </div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
export default function App() {
  const [allData, setAllData] = useState([]);
  const [loadedFiles, setLoadedFiles] = useState({});
  const [slicerStart, setSlicerStart] = useState(null);
  const [slicerEnd, setSlicerEnd] = useState(null);
  const [tab, setTab] = useState("overview");
  const [metricOv, setMetricOv] = useState("items");
  const [metricP, setMetricP] = useState("items");
  const [roleP, setRoleP] = useState("all");
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();

  const allDates = [...new Set(allData.map(d => d.date))].sort();

  const slicedDates = !slicerStart ? allDates
    : !slicerEnd ? allDates.filter(d => d === slicerStart)
    : allDates.filter(d => d >= slicerStart && d <= slicerEnd);

  const getFiltered = useCallback(() => {
    let d = allData.filter(r => slicedDates.includes(r.date));
    if (tab === "person" && roleP !== "all") d = d.filter(r => r.role === roleP);
    return d;
  }, [allData, slicedDates, tab, roleP]);

  const filtered = getFiltered();
  const totalItems = filtered.reduce((s,r) => s+r.items, 0);
  const totalRx    = filtered.reduce((s,r) => s+r.rx, 0);
  const totalErr   = filtered.reduce((s,r) => s+r.errors, 0);
  const totalNames = new Set(filtered.map(r=>r.name)).size;

  async function handleFiles(files) {
    setUploading(true);
    let newData = [...allData];
    const newFiles = { ...loadedFiles };
    for (const file of Array.from(files)) {
      const date = dateFromFilename(file.name) || prompt(`ไม่พบวันที่ในชื่อไฟล์ "${file.name}"\nพิมพ์วันที่ (YYYY-MM-DD):`);
      if (!date) continue;
      const rows = await new Promise((res,rej) => {
        const r = new FileReader();
        r.onload = e => { try { const wb=XLSX.read(e.target.result,{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]]; res(XLSX.utils.sheet_to_json(ws,{header:1,defval:null})); } catch(e){rej(e)} };
        r.onerror = rej; r.readAsArrayBuffer(file);
      });
      const parsed = parseRows(rows, date);
      if (!parsed.length) continue;
      newFiles[file.name] = date;
      newData = newData.filter(d => d.date !== date);
      newData.push(...parsed);
    }
    setAllData(newData);
    setLoadedFiles(newFiles);
    setUploading(false);
  }

  function removeFile(name, date) {
    setLoadedFiles(f => { const c={...f}; delete c[name]; return c; });
    setAllData(d => d.filter(r => r.date !== date));
  }

  function chipClick(date) {
    if (!slicerStart || slicerEnd) { setSlicerStart(date); setSlicerEnd(null); }
    else { if (date < slicerStart) { setSlicerEnd(slicerStart); setSlicerStart(date); } else setSlicerEnd(date); }
  }

  const dateRangeLabel = allDates.length === 0 ? "ยังไม่มีข้อมูล — อัปโหลดไฟล์ Excel เพื่อเริ่มใช้งาน"
    : allDates.length === 1 ? allDates[0]
    : `${allDates[0]} ถึง ${allDates[allDates.length-1]} (${allDates.length} วัน)`;

  const TAB_STYLE = active => ({
    padding:"7px 18px", fontSize:13, border:"none", background:"none", cursor:"pointer",
    color: active ? "#1a1a2e" : "#999",
    borderBottom: active ? "2px solid #1a1a2e" : "2px solid transparent",
    fontWeight: active ? 600 : 400, marginBottom:-1, borderRadius:0,
  });

  return (
    <div style={{ fontFamily:"'Sarabun', 'IBM Plex Sans Thai', sans-serif", maxWidth:820, margin:"0 auto", padding:"1.25rem 1rem", color:"#1a1a2e" }}>

      {/* Header */}
      <div style={{ marginBottom:"1rem" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
          <div>
            <h1 style={{ fontSize:18, fontWeight:700, color:"#1a1a2e", margin:0, lineHeight:1.3 }}>Workload Dashboard ห้องยาลีลาวดี</h1>
            <div style={{ fontSize:12, color:"#B07010", fontWeight:600, marginTop:3 }}>เฉพาะในเวลาทำการ</div>
            <div style={{ fontSize:12, color:"#aaa", marginTop:2 }}>{dateRangeLabel}</div>
          </div>
          <label style={{ border:"0.5px dashed #C0C0CC", borderRadius:10, padding:"8px 14px", cursor:"pointer", display:"flex", alignItems:"center", gap:8, background:"#FAFAFA", transition:"background .15s" }}
            onMouseOver={e=>e.currentTarget.style.background="#F0F1F5"} onMouseOut={e=>e.currentTarget.style.background="#FAFAFA"}>
            <span style={{ fontSize:18 }}>📂</span>
            <div>
              <div style={{ fontSize:13, color:"#555" }}>{uploading ? "กำลังโหลด…" : "อัปโหลด Excel (หลายไฟล์ได้)"}</div>
              <div style={{ fontSize:11, color:"#aaa" }}>ชื่อไฟล์ต้องมีวันที่ เช่น workload_2026-05-19.xlsx</div>
            </div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" multiple style={{ display:"none" }} onChange={e => handleFiles(e.target.files)} />
          </label>
        </div>


      </div>

      {/* Date Slicer */}
      {allDates.length > 0 && (
        <DateSlicer dates={allDates} slicerStart={slicerStart} slicerEnd={slicerEnd} onChipClick={chipClick} onReset={() => { setSlicerStart(null); setSlicerEnd(null); }} />
      )}

      {/* KPI */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
        <KPICard label="บุคลากร" value={totalNames} sub="คน" />
        <KPICard label="จำนวนวัน" value={slicedDates.length || "—"} sub="วัน" />
        <KPICard label="รายการยารวม" value={totalItems.toLocaleString()} sub="รายการ" />
        <KPICard label="ใบสั่งยารวม" value={totalRx.toLocaleString()} sub="ใบ" />
        <KPICard label="จัดผิด" value={totalErr} sub="รายการ" danger={totalErr > 0} />
      </div>

      {/* Tabs */}
      <div style={{ borderBottom:"0.5px solid #E8E8EC", display:"flex", marginBottom:16 }}>
        <button style={TAB_STYLE(tab==="overview")} onClick={() => setTab("overview")}>ภาพรวม</button>
        <button style={TAB_STYLE(tab==="trend")} onClick={() => setTab("trend")}>แนวโน้มรายวัน</button>
        <button style={TAB_STYLE(tab==="person")} onClick={() => setTab("person")}>รายบุคคล</button>
      </div>

      {/* Empty state */}
      {allData.length === 0 && (
        <div style={{ textAlign:"center", padding:"4rem 2rem", color:"#aaa" }}>
          <div style={{ fontSize:40, marginBottom:12 }}>📊</div>
          <div style={{ fontSize:15, fontWeight:600, color:"#999", marginBottom:6 }}>ยังไม่มีข้อมูล</div>
          <div style={{ fontSize:13 }}>อัปโหลดไฟล์ Excel รายวันเพื่อเริ่มใช้งาน</div>
        </div>
      )}

      {/* Tab content */}
      {allData.length > 0 && tab === "overview" && (
        <OverviewTab filtered={filtered} metric={metricOv} onMetricChange={setMetricOv} />
      )}
      {allData.length > 0 && tab === "trend" && (
        <TrendTab slicedDates={slicedDates} allData={allData} />
      )}
      {allData.length > 0 && tab === "person" && (
        <PersonTab filtered={filtered} allData={allData} slicedDates={slicedDates} metric={metricP} onMetricChange={setMetricP} role={roleP} onRoleChange={setRoleP} />
      )}

    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
